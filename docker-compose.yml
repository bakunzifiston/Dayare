# Local MySQL for DayareMeat (matches .env: dayaremeat / root / no password)
# Start Docker Desktop, then: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    container_name: dayaremeat-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: dayaremeat
    volumes:
      - dayaremeat_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dayaremeat_mysql_data:
